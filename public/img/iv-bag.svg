<!-- Premium IV bag illustration for the home hero scroll-rotate element.
     SVG so it scales crisp at any size. Glass highlight + drop shadow give
     the 3D feel without an actual 3D engine. Liquid uses a cobalt → mint
     gradient. The label carries the R+ glyph in white. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 480" fill="none">
  <defs>
    <!-- Liquid gradient: cobalt deep top → mint bottom -->
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3D4FB5"/>
      <stop offset="55%"  stop-color="#4F61B4"/>
      <stop offset="100%" stop-color="#6B7DC0"/>
    </linearGradient>
    <!-- Bag plastic gradient -->
    <linearGradient id="bagShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="35%"  stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="70%"  stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.25"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="bagShadow" x="-40%" y="-20%" width="180%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="20" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g filter="url(#bagShadow)">
    <!-- Hanger ring top -->
    <circle cx="160" cy="22" r="14" fill="none" stroke="#1F2D5A" stroke-width="6"/>
    <!-- Bag main body — rounded rectangle -->
    <rect
      x="60" y="50" width="200" height="320" rx="38" ry="38"
      fill="url(#liquid)"
      stroke="#1F2D5A" stroke-width="3"
    />
    <!-- Bag plastic shine overlay -->
    <rect x="60" y="50" width="200" height="320" rx="38" ry="38" fill="url(#bagShine)"/>
    <!-- Highlight strip on left edge -->
    <rect x="76" y="74" width="20" height="240" rx="10" fill="#FFFFFF" fill-opacity="0.35"/>
    <!-- Bubbles in liquid -->
    <circle cx="120" cy="220" r="6" fill="#FFFFFF" fill-opacity="0.35"/>
    <circle cx="200" cy="160" r="4" fill="#FFFFFF" fill-opacity="0.55"/>
    <circle cx="180" cy="280" r="5" fill="#FFFFFF" fill-opacity="0.25"/>
    <circle cx="135" cy="320" r="3" fill="#FFFFFF" fill-opacity="0.45"/>

    <!-- Label centered -->
    <rect x="100" y="180" width="120" height="80" rx="10" fill="#FBF8F2" stroke="#1F2D5A" stroke-width="1.5"/>
    <text x="160" y="222" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#1F2D5A" text-anchor="middle" letter-spacing="-0.5">RP</text>
    <text x="160" y="246" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#64748B" text-anchor="middle" letter-spacing="2.5">RECOVERY POINT</text>

    <!-- Drip chamber + tube -->
    <rect x="148" y="370" width="24" height="22" rx="3" fill="#FBF8F2" stroke="#1F2D5A" stroke-width="2"/>
    <!-- Drip drop -->
    <ellipse cx="160" cy="385" rx="3" ry="4" fill="url(#liquid)" opacity="0.85"/>
    <!-- Tube down -->
    <path d="M160 392 Q 162 410 158 425 Q 156 440 162 455" stroke="#1F2D5A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Roller clamp -->
    <rect x="148" y="425" width="24" height="10" rx="4" fill="#1F2D5A"/>
  </g>
</svg>
